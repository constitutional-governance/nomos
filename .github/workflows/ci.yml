name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest tests/ -q

      - name: Enforced Gherkin checks
        run: behave --tags=enforced --no-capture
        env:
          GOVERNANCE_REPO_PATH: ${{ github.workspace }}/examples/kafka
