app = "nomos-governance"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  GOVERNANCE_MODE = "github"
  MCP_SERVER_HOST = "0.0.0.0"
  MCP_SERVER_PORT = "8080"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
